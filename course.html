<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course | Study Portal</title>

<link rel="stylesheet" href="css/style.css">

<style>

.course-container{
padding:40px;
color:white;
}

.week{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.week h3{
margin-bottom:15px;
}

.module-btn{
padding:10px 15px;
border:none;
background:white;
color:#6a11cb;
border-radius:6px;
margin-right:10px;
cursor:pointer;
}

.module-btn:hover{
background:#f1f1f1;
}

.locked{
opacity:0.4;
pointer-events:none;
}

</style>

</head>

<body class="auth-body">

<div class="course-container">

<h1 id="courseTitle"></h1>


<!-- WEEK 1 -->

<div class="week">

<h3>Week 1</h3>

<button class="module-btn" onclick="completeWeek(1)">Module 1</button>
<button class="module-btn" onclick="completeWeek(1)">Module 2</button>

</div>


<!-- WEEK 2 -->

<div class="week locked" id="week2">

<h3>Week 2 🔒</h3>

<button class="module-btn" onclick="completeWeek(2)">Module 1</button>
<button class="module-btn" onclick="completeWeek(2)">Module 2</button>

</div>


<!-- WEEK 3 -->

<div class="week locked" id="week3">

<h3>Week 3 🔒</h3>

<button class="module-btn" onclick="completeWeek(3)">Module 1</button>
<button class="module-btn" onclick="completeWeek(3)">Module 2</button>

</div>


<!-- WEEK 4 -->

<div class="week locked" id="week4">

<h3>Week 4 🔒</h3>

<button class="module-btn" onclick="completeWeek(4)">Module 1</button>
<button class="module-btn" onclick="completeWeek(4)">Module 2</button>

</div>

</div>


<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/app.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const course = params.get("course");

if(course){

document.getElementById("courseTitle").innerText = course + " Course";

}


function completeWeek(week){

let nextWeek = week + 1;

let next = document.getElementById("week"+nextWeek);

if(next){

next.classList.remove("locked");

}

}

</script>

</body>
</html>
